<!DOCTYPE html>
<html lang="es">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Carrito</title>	

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>

		body{
    	background:#f5f5f5;
		}

		.navbar{
    	background:#d9b2bd;
    	padding:15px;
		}

		.card-carrito{
    	background:white;
    	padding:30px;
    	border-radius:20px;
    	box-shadow:0 0 20px rgba(0,0,0,.1);
		}

		footer{
    	background:#222;
    	color:white;
    	text-align:center;
    	padding:20px;
    	margin-top:50px;
		}

</style>

</head>

<body>

<!-- NAVBAR -->

	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container">
			<a class="navbar-brand" href="index.html"> Piñatas Lidia </a>

			<ul class="navbar-nav ms-auto">
				<li class="nav-item">
					<a class="nav-link" href="index.html"> Inicio </a>
				</li>
			</ul>
		</div>
	</nav>

<!-- CARRITO -->
		<div class="container mt-5">
			<div class="card-carrito">
				<h1 class="mb-4"> Carrito de Compras </h1>
				<ul id="lista-carrito"class="list-group mb-4"></ul>
				<h4 id="total-productos"> Total de productos: 0 </h4>
				<div class="mt-4">
					<button class="btn btn-danger"onclick="vaciarCarrito()"> Vaciar carrito </button>
				</div>
			</div>
		</div>
		
		<footer> © 2026 Piñatas Lidia </footer>
		
		<script>
			const lista =
			document.getElementById("lista-carrito");
			
			let carrito = 
			JSON.parse(localStorage.getItem("carrito")) || [];

			function mostrarCarrito(){
				lista.innerHTML = "";
				carrito.forEach((producto,index)=>{
					lista.innerHTML += `
					
					<li class="list-group-item d-flex justify-content-between align-items-center">
						
						${producto} 
						<button class="btn btn-sm btn-danger" onclick="eliminarProducto(${index})">
							X
						</button>
					</li>
					`;
				});

    document.getElementById("total-productos")
    .innerHTML =
    "Total de productos: " + carrito.length;

}

function eliminarProducto(index){

    carrito.splice(index,1);

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    mostrarCarrito();

}

function vaciarCarrito(){

    localStorage.removeItem("carrito");

    carrito = [];

    mostrarCarrito();

}

mostrarCarrito();

</script>

</body>
</html>
